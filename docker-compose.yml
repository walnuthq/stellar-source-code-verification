services:
  postgres:
    image: postgres:17
    container_name: api-registry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: verifier
      POSTGRES_PASSWORD: verifier
      POSTGRES_DB: verifier
    ports:
      - "5434:5432"
    volumes:
      - verifier_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verifier -d verifier"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Compute service: runs `stellar contract verify` inside rootless
  # Docker-in-Docker. Stateless (no DB) — the api-registry service calls it over
  # HTTP on the compose network (http://api-verify:8080).
  api-verify:
    build:
      context: .
      dockerfile: apps/api-verify/Dockerfile
    container_name: api-verify
    # Required to run the rootless Docker-in-Docker daemon that
    # `stellar contract verify` shells out to.
    privileged: true
    ports:
      # Host port defaults to 8080; override with API_VERIFY_PORT if it's taken.
      - "${API_VERIFY_PORT:-8080}:8080"
    # PORT defaults to 8080 in the image; the daemon wiring (DOCKER_HOST /
    # DOCKER_TLS_CERTDIR) is baked in too.
    volumes:
      # Persist the inner daemon's image/layer store so verify runs don't re-pull
      # build images on every restart.
      - verify_dind:/home/rootless/.local/share/docker
    healthcheck:
      # TCP check: the server is listening.
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(8080,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # One-shot: apply the Drizzle schema to Postgres before the registry starts.
  # Reuses the Dockerfile `migrate` stage (drizzle-kit + source schema).
  api-registry-migrate:
    build:
      context: .
      dockerfile: apps/api-registry/Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgres://verifier:verifier@postgres:5432/verifier
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Registry / SEP API. Serves the wasm verification registry and delegates the
  # reproducible build to api-verify over the compose network.
  api-registry:
    build:
      context: .
      dockerfile: apps/api-registry/Dockerfile
      target: runtime
    container_name: api-registry
    ports:
      # Host port defaults to 8081; override with API_REGISTRY_PORT if it's taken.
      - "${API_REGISTRY_PORT:-8081}:8081"
    environment:
      DATABASE_URL: postgres://verifier:verifier@postgres:5432/verifier
      API_VERIFY_URL: http://api-verify:8080
      VERIFIER_NAME: "Example Verification Service"
      VERIFIER_URL: "https://verify.example.com"
      # STELLAR_RPC_URL defaults to mainnet (see src/lib/constants.ts).
    depends_on:
      postgres:
        condition: service_healthy
      api-registry-migrate:
        condition: service_completed_successfully
    healthcheck:
      # TCP check: the server is listening (independent of upstream RPC).
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(8081,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

volumes:
  verifier_pgdata:
  verify_dind:
