name: Deploy api-verifier to Cloudflare

on:
  push:
    branches: [main]
    # Deploy only when this service, its Cloudflare wrapper, the stellar-cli
    # submodule it builds from, or a shared dependency/workspace manifest
    # changes — unrelated changes don't redeploy.
    paths:
      - "apps/api-verifier/**"
      - "apps/api-verifier-cloudflare/**"
      - "stellar-cli"
      - ".gitmodules"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api-verifier-cloudflare.yml"
  workflow_dispatch:

# Never run two deploys of this service at once; queue rather than cancel so an
# in-flight deploy is not interrupted.
concurrency:
  group: deploy-api-verifier-cloudflare
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # The container image is built from apps/api-verifier/Dockerfile, which
        # compiles the `stellar` CLI from the `stellar-cli` git submodule, so it
        # must be checked out for the build context.
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy api-verifier to Cloudflare
        working-directory: apps/api-verifier-cloudflare
        run: pnpm cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
